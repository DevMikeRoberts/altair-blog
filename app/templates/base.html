<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Altair Blog</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; line-height: 1.6; max-width: 720px; margin: 0 auto; padding: 20px; color: #1a1a2e; }
        nav { padding: 1rem 0; margin-bottom: 2rem; border-bottom: 2px solid #1a1a2e; display: flex; justify-content: space-between; align-items: baseline; }
        nav a { color: #1a1a2e; text-decoration: none; font-weight: 600; font-size: 1.2rem; }
        nav .api-link { font-size: 0.85rem; color: #666; }
        h1 { font-size: 1.8rem; margin-bottom: 1.5rem; }
        h2 { font-size: 1.4rem; margin-bottom: 0.25rem; }
        .post { margin-bottom: 2rem; padding-bottom: 1.5rem; border-bottom: 1px solid #eee; }
        .post:last-child { border-bottom: none; }
        .post-meta { color: #666; font-size: 0.9rem; margin-bottom: 0.5rem; }
        .post a { color: #1a1a2e; text-decoration: none; }
        .post a:hover { text-decoration: underline; }
        .content { margin-top: 1rem; }
        .empty { color: #999; font-style: italic; }
    </style>
</head>
<body>
    <nav>
        <a href="/">Altair Blog</a>
        <span class="api-link"><a href="/api/posts/">API</a></span>
    </nav>
    {% block content %}{% endblock %}
</body>
</html>
