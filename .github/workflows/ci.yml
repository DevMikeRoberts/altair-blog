name: CI

on:
  pull_request:
    branches: [main]

env:
  AWS_REGION: us-east-1

jobs:
  checkov:
    name: Checkov (IaC Security)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Checkov on Terraform
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: infra/
          framework: terraform
          quiet: true
          soft_fail: false
          skip_check: >-
            CKV_AWS_272,CKV_AWS_126,
            CKV_AWS_91,CKV_AWS_2,
            CKV_AWS_51,
            CKV_AWS_158,CKV_AWS_149,
            CKV_AWS_336,
            CKV_AWS_161,CKV_AWS_353,CKV_AWS_157,CKV_AWS_118,
            CKV_AWS_260,CKV_AWS_382,
            CKV_AWS_136,
            CKV2_AWS_20,CKV2_AWS_30,CKV2_AWS_11,CKV2_AWS_57,
            CKV_AWS_378,CKV_AWS_103,CKV2_AWS_28

  terraform:
    name: Terraform Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./infra
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - name: Terraform Fmt
        run: terraform fmt -check -recursive
      - name: Terraform Init
        run: terraform init -backend=false
      - name: Terraform Validate
        run: terraform validate

  django-tests:
    name: Django Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./app
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run tests
        run: python manage.py test
        env:
          DJANGO_SETTINGS_MODULE: test_settings
