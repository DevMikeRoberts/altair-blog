name: Deploy to AWS

on:
  push:
    branches: [main]

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: altair-blog

permissions:
  id-token: write
  contents: read

jobs:
  validate:
    name: Security & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Checkov on Terraform
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: infra/
          framework: terraform
          quiet: true
          soft_fail: false
          skip_check: >-
            CKV_AWS_272,CKV_AWS_126,
            CKV_AWS_91,CKV_AWS_2,
            CKV_AWS_51,
            CKV_AWS_158,CKV_AWS_149,
            CKV_AWS_336,
            CKV_AWS_161,CKV_AWS_353,CKV_AWS_157,CKV_AWS_118,
            CKV_AWS_260,CKV_AWS_382,
            CKV_AWS_136,
            CKV2_AWS_20,CKV2_AWS_30,CKV2_AWS_11,CKV2_AWS_57,
            CKV_AWS_378,CKV_AWS_103,CKV2_AWS_28,
            CKV_AWS_130

      - uses: hashicorp/setup-terraform@v3
      - name: Terraform Fmt
        run: terraform fmt -check -recursive
        working-directory: ./infra
      - name: Terraform Validate
        run: |
          terraform init -backend=false
          terraform validate
        working-directory: ./infra

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [validate]
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init
        working-directory: ./infra

      - name: Terraform Apply
        run: terraform apply -auto-approve
        working-directory: ./infra

      - name: Build, tag, and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG ./app
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
                    $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push --all-tags $ECR_REGISTRY/$ECR_REPOSITORY

      - name: Force ECS deployment
        run: |
          aws ecs update-service \
            --cluster altair-blog \
            --service altair-blog \
            --force-new-deployment

      - name: Show ALB URL
        run: |
          terraform output -raw alb_dns_name
        working-directory: ./infra
